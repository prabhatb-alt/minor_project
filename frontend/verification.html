<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Verification | Credlytic Network</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --primary-green: #00e676;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --error-red: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .verification-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--text-main);
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-green);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00c853;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Status and Result Areas */
        #status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .error-msg {
            background-color: rgba(255, 77, 77, 0.1);
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        #result-box {
            margin-top: 30px;
            display: none;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #333;
        }

        .result-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .result-value {
            font-weight: 600;
            font-size: 14px;
            text-align: right;
            max-width: 60%;
            word-wrap: break-word;
        }

        .verified-badge {
            display: inline-block;
            background-color: rgba(0, 230, 118, 0.1);
            color: var(--primary-green);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 5px;
            border: 1px solid var(--primary-green);
        }
        
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="verification-card">
            <h2>Cryptographic Verification</h2>
            <div class="subtitle">Aptos Testnet Secure Ledger Lookup</div>

            <form id="verifyForm">
                <div class="form-group">
                    <label for="txHash">Blockchain Transaction Hash (Required)</label>
                    <input type="text" id="txHash" placeholder="0x..." required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="email">Student Email (Optional Identity Check)</label>
                    <input type="email" id="email" placeholder="student@example.com" autocomplete="off">
                </div>

                <button type="submit" id="verifyBtn">
                    <span id="btnText">Verify Record</span>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </form>

            <div id="status-message"></div>

            <div id="result-box">
                <div class="result-item">
                    <span class="result-label">Status</span>
                    <span class="result-value">
                        <span style="color: var(--primary-green);">Valid on Blockchain</span>
                    </span>
                </div>
                <div class="result-item">
                    <span class="result-label">Candidate Name</span>
                    <span class="result-value" id="resName"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Credential</span>
                    <span class="result-value" id="resCourse"></span>
                </div>
                <div class="result-item" id="emailResultRow">
                    <span class="result-label">Identity Match</span>
                    <span class="result-value" id="resIdentity"></span>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <a id="resExplorer" href="#" target="_blank" style="color: var(--primary-green); text-decoration: none; font-size: 14px;">View Raw Ledger Data &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const txHash = document.getElementById('txHash').value.trim();
            const email = document.getElementById('email').value.trim();
            
            const btn = document.getElementById('verifyBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('btnLoader');
            const statusBox = document.getElementById('status-message');
            const resultBox = document.getElementById('result-box');

            // Reset UI
            statusBox.style.display = 'none';
            resultBox.style.display = 'none';
            statusBox.className = '';
            
            // Loading State
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';

            try {
                // IMPORTANT: This relative path automatically resolves to your Render backend 
                // because of how Vercel routing / Flask CORS is set up.
                const response = await fetch('/api/employer/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tx_hash: txHash, email: email })
                });

                const data = await response.json();

                if (response.ok && data.ok) {
                    // SUCCESS STATE
                    const cert = data.certificate;
                    
                    document.getElementById('resName').textContent = cert.student_name;
                    document.getElementById('resCourse').textContent = cert.course_name;
                    
                    // Email Identity Logic
                    const identityBox = document.getElementById('resIdentity');
                    if (email) {
                        if (cert.email_fully_verified) {
                            identityBox.innerHTML = `<span class="verified-badge">Exact Match ✓</span>`;
                        }
                    } else {
                        identityBox.innerHTML = `<span style="color: #888; font-size: 12px;">Not requested</span>`;
                    }

                    // Testnet Explorer Link
                    document.getElementById('resExplorer').href = `https://explorer.aptoslabs.com/txn/${cert.tx_hash}?network=testnet`;
                    
                    resultBox.style.display = 'block';
                } else {
                    // ERROR STATE (Caught by your Python Logic)
                    statusBox.textContent = data.error || "Verification failed.";
                    statusBox.className = 'error-msg';
                    statusBox.style.display = 'block';
                }

            } catch (error) {
                console.error('Verification Error:', error);
                statusBox.textContent = "Network error. Could not reach the verification server.";
                statusBox.className = 'error-msg';
                statusBox.style.display = 'block';
            } finally {
                // Restore Button
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
