<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Access | Credlytic</title>
    
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <nav>
            <div class="logo">
                <div class="logo-dot"></div>
                Credlytic <span style="font-size: 0.8rem; color: var(--text-muted); margin-left: 10px; font-weight: 400;">STUDENT PORTAL</span>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                    <svg id="icon-sun" class="hidden" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <a href="/" class="btn btn-secondary" style="padding: 8px 20px; font-size: 0.9rem;">Back Home</a>
            </div>
        </nav>

        <main style="max-width: 450px; margin: 6rem auto; padding: 0 15px;">
            <section class="glass-card" style="text-align: center; padding: 3.5rem 2.5rem;">
                
                <div style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 16px; background: rgba(0, 224, 121, 0.1); margin-bottom: 1.5rem; border: 1px solid var(--primary);">
                    <svg viewBox="0 0 24 24" style="width: 32px; height: 32px; fill: none; stroke: var(--primary); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                
                <h2 style="margin-bottom: 0.5rem; font-size: 1.8rem;">Student Login</h2>
                <p class="text-muted" style="margin-bottom: 2.5rem; font-size: 0.95rem;">Access your cryptographically secured academic records and certificates.</p>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    
                    <div id="g_id_onload"
                         data-client_id="183630370771-culskbfenon3ca0fo7jfiamp1d6odb22.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleGoogleLogin"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin"
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="outline"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left"
                         style="display: flex; justify-content: center; width: 100%;">
                    </div>

                    <div style="display: flex; align-items: center; margin: 0.5rem 0;">
                        <div style="flex: 1; height: 1px; background: var(--card-border);"></div>
                        <span style="padding: 0 15px; color: var(--text-muted); font-size: 0.8rem; font-weight: 600;">OR</span>
                        <div style="flex: 1; height: 1px; background: var(--card-border);"></div>
                    </div>

                    <button onclick="handleMicrosoftLogin()" class="btn" style="background: transparent; border: 1px solid var(--card-border); color: var(--text-main); padding: 10px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 500; font-family: 'Inter', sans-serif; font-size: 14px; transition: background 0.2s;">
                        <svg xmlns="http://www.w3.org/2000/html" width="20" height="20" viewBox="0 0 21 21"><path fill="#f25022" d="M1 1h9v9H1z"/><path fill="#00a4ef" d="M1 11h9v9H1z"/><path fill="#7fba00" d="M11 1h9v9h-9z"/><path fill="#ffb900" d="M11 11h9v9h-9z"/></svg>
                        Sign in with Outlook
                    </button>
                </div>

                <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--card-border);">
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px;">DEVELOPER QUICK-TEST</p>
                    <input type="email" id="devEmail" placeholder="Enter test email..." style="width: 100%; background: var(--bg-main); border: 1px solid var(--card-border); color: var(--text-main); padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 0.85rem; outline: none;">
                    <button onclick="devLogin()" class="btn btn-secondary" style="width: 100%; padding: 8px; font-size: 0.85rem;">Bypass Auth</button>
                </div>

            </section>
        </main>
    </div>

    <script src="/js/network-bg.js"></script>

    <script>
        // --- 1. Google Authentication Logic ---
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleGoogleLogin(response) {
            const payload = parseJwt(response.credential);
            const userEmail = payload.email;
            
            // Save the email to localStorage so stud_dash.html can find it
            localStorage.setItem('student_email', userEmail);
            
            // Send them to the dashboard!
            window.location.href = "/student/dashboard";
        }

        // --- 2. Microsoft / Outlook Logic ---
        function handleMicrosoftLogin() {
            // Note: To make this work securely, you'd wire this button up to 
            // Supabase Auth -> Azure AD provider in your final build.
            alert("Microsoft Authentication is currently being configured by the IT department. Please use the developer bypass for testing.");
        }

        // --- 3. Developer Bypass (For testing your dashboard fast) ---
        function devLogin() {
            const email = document.getElementById('devEmail').value.trim();
            if(email) {
                localStorage.setItem('student_email', email);
                window.location.href = "/student/dashboard";
            } else {
                alert("Enter an email to test!");
            }
        }

        // --- Theme Toggle Logic ---
        const root = document.documentElement;
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        
        root.setAttribute('data-theme', savedTheme);
        updateIcons(savedTheme);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const newTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcons(newTheme);
        });

        function updateIcons(theme) {
            if (theme === 'dark') {
                iconMoon.classList.remove('hidden');
                iconSun.classList.add('hidden');
            } else {
                iconSun.classList.remove('hidden');
                iconMoon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
